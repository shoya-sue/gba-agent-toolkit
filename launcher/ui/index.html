<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GBA Agent Launcher</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        margin: 0; padding: 20px; background: #1c2333; color: #e6e9f0;
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      .sub { font-size: 12px; color: #8b95ad; margin: 0 0 20px; }
      label { display: block; font-size: 12px; color: #9aa4bd; margin: 14px 0 4px; }
      .row { display: flex; gap: 8px; }
      input {
        width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #38415c;
        background: #232c42; color: #e6e9f0; font-size: 13px;
      }
      input.narrow { width: 110px; }
      button {
        padding: 8px 14px; border-radius: 6px; border: 0; font-size: 13px; cursor: pointer;
        background: #2b3a67; color: #fff; font-weight: 600;
      }
      button:hover { background: #34467d; }
      button.ghost { background: #38415c; }
      button.big { width: 100%; padding: 12px; font-size: 15px; margin-top: 18px; background: #3a5bd9; }
      button.big:hover { background: #4467e8; }
      button.stop { background: #7a2b3a; }
      button:disabled { opacity: .5; cursor: default; }
      #status {
        margin-top: 18px; padding: 12px; border-radius: 6px; font-size: 12px;
        white-space: pre-wrap; word-break: break-all; min-height: 40px;
        background: #232c42; border: 1px solid #38415c;
      }
      .ok { border-color: #2f7d4f !important; }
      .err { border-color: #a13a4a !important; }
      .muted { color: #8b95ad; }
    </style>
  </head>
  <body>
    <h1>🎮 GBA Agent Launcher</h1>
    <p class="sub">ROM を選んで Start。mGBA + bridge.lua + MCP を一括起動します。</p>

    <label>ROM ファイル</label>
    <div class="row">
      <input id="rom" type="text" placeholder="ROM のパス（Browse で選択）" />
      <button class="ghost" id="browse">Browse…</button>
    </div>

    <div class="row" style="margin-top: 4px;">
      <div>
        <label>Port</label>
        <input id="port" class="narrow" type="text" value="8765" />
      </div>
      <div>
        <label>Bind (localhost 固定推奨)</label>
        <input id="bind" type="text" value="127.0.0.1" />
      </div>
    </div>

    <button class="big" id="start">▶ Start</button>
    <button class="big stop" id="stop" style="margin-top: 8px;">■ Stop</button>

    <div id="status" class="muted">待機中…</div>

    <script src="main.js" defer></script>
  </body>
</html>
